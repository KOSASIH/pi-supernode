# k8s/supernode-deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: supernode-ai
  labels:
    app: supernode-ai
spec:
  replicas: 3
  selector:
    matchLabels:
      app: supernode-ai
  template:
    metadata:
      labels:
        app: supernode-ai
    spec:
      containers:
      - name: ai-api
        image: ghcr.io/kosasih/pi-supernode-ai:gpu-latest
        resources:
          limits:
            nvidia.com/gpu: 1  # 🆕 GPU!
            memory: 8Gi
            cpu: 4
          requests:
            nvidia.com/gpu: 1
            memory: 4Gi
            cpu: 2
        ports:
        - containerPort: 8000
        envFrom:
        - configMapRef:
            name: supernode-config
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: supernode-ai-service
spec:
  selector:
    app: supernode-ai
  ports:
  - port: 80
    targetPort: 8000
  type: LoadBalancer
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: supernode-ai-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: supernode-ai
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
